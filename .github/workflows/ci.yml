name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore packages/Packages.slnx

      - name: Build
        run: dotnet build packages/Packages.slnx -c Release --no-restore

      - name: Test
        run: dotnet test packages/Packages.slnx -c Release --no-build